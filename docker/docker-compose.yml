version: "3.9"

networks:
  streamforge-net:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

services:

  #PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: streamforge-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB:       streamforge
      POSTGRES_USER:     streamforge
      POSTGRES_PASSWORD: streamforge123
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - streamforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamforge -d streamforge"]
      interval: 5s
      timeout: 3s
      retries: 10

  #Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: streamforge-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    networks:
      - streamforge-net
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  #Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: streamforge-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - streamforge-net
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  #Prometheus
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: streamforge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - streamforge-net

  #Grafana
  grafana:
    image: grafana/grafana:11.0.0
    container_name: streamforge-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - streamforge-net
    depends_on:
      - prometheus