name: StreamForge CI

on:
  push:
    branches: [ main, develop, "feature/**", "fix/**", "refactor/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Instalar modulos base en repositorio local
        run: mvn install -pl streamforge-core,streamforge-quality,streamforge-connectors --also-make -DskipTests --no-transfer-progress

      - name: Compilar todos los modulos
        run: mvn compile --no-transfer-progress

      - name: Tests unitarios - core
        run: mvn test --no-transfer-progress -pl streamforge-core -Dtest="DAGBuilderTest,TopologicalSorterTest,PipelineDefinitionTest,DAGProperties,PipelineFSMTest,StepFSMTest,InMemoryCheckpointManagerTest,LineageGraphTest"

      - name: Tests unitarios - quality
        run: mvn test --no-transfer-progress -pl streamforge-quality -Dtest="QualityRuleEngineTest,RuleEvaluatorsTest,QualityRuleProperties"

      - name: Tests de integracion - engine
        run: mvn test --no-transfer-progress -pl streamforge-engine -Dtest="PostgresCheckpointManagerIT,PostgresLineageRepositoryIT"

      - name: Subir reportes de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: "**/target/surefire-reports/*.xml"
          retention-days: 7